<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hong Kong — 3D Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-mono: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    body, input, button, .legend, #txnPopup, .maplibregl-ctrl-attrib {
      font-family: var(--font-mono);
    }
    body {
      overflow: hidden;
      background: #f0f1f3;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none; /* let the main map handle interactions */
    }

    #overlay .maplibregl-canvas-container {
      filter: none; /* keep overlay colors as-is */
    }

    /* Always-on-top HTML popup */
    #txnPopup {
      position: fixed;
      z-index: 9999;
      display: none;
      min-width: 200px;
      max-width: 320px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      color: #111827;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.35;
    }
    #txnPopup .close {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.20);
      color: #374151;
      border: 1px solid rgba(255, 255, 255, 0.25);
      cursor: pointer;
      font-size: 16px;
      line-height: 26px;
    }
    #txnPopup .close:hover {
      background: rgba(255, 255, 255, 0.30);
    }

    .maplibregl-canvas-container {
      filter: grayscale(100%);
    }

    .maplibregl-ctrl-group {
      border-radius: 12px !important;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.25) !important;
      background: rgba(255, 255, 255, 0.12) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .maplibregl-ctrl-group button {
      width: 36px !important;
      height: 36px !important;
      background: transparent !important;
      border: none !important;
    }

    .maplibregl-ctrl-attrib {
      background: rgba(229, 231, 235, 0.9) !important;
      font-size: 10px;
    }

    .mode-toggle {
      position: absolute;
      top: 12px;
      right: 52px;
      z-index: 1;
      display: flex;
      gap: 4px;
    }
    .mode-btn {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #374151;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }
    .txn-toggle .mode-btn {
      width: auto;
      min-width: 120px;
      height: 36px;
      padding: 0 12px;
    }
    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.22);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    .mode-btn.active {
      background: rgba(75, 85, 99, 0.35);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    .txn-toggle {
      position: absolute;
      top: 12px;
      right: 250px;
      z-index: 3;
    }

    .legend {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 3;
      width: 220px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      padding: 10px 10px 10px 12px;
      color: #111827;
      font-size: 12px;
    }
    .legend-title {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 8px;
      color: #374151;
    }
    .legend-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }
    .legend-swatch {
      width: 18px;
      height: 12px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }
    .legend-note {
      margin-top: 8px;
      color: #6b7280;
      font-size: 11px;
      line-height: 1.2;
    }

    .search-box {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      padding: 6px 10px;
    }
    .search-box input {
      width: 200px;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #111827;
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
    }
    .search-box input::placeholder {
      color: #6b7280;
    }
    .search-box button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(75, 85, 99, 0.5);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .search-box button:hover {
      background: rgba(75, 85, 99, 0.7);
    }

    .estate-txns-widget {
      position: absolute;
      left: 12px;
      top: 88px;
      bottom: 200px;
      z-index: 4;
      width: 360px;
      max-width: calc(100vw - 24px);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      display: none;
      overflow: hidden;
      color: #111827;
      flex-direction: column;
    }
    .estate-txns-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 10px 8px;
      color: #374151;
      font-weight: 700;
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
    }
    .estate-txns-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .estate-txns-close {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.20);
      color: #374151;
      cursor: pointer;
      font-size: 16px;
      line-height: 26px;
    }
    .estate-txns-close:hover {
      background: rgba(255, 255, 255, 0.30);
    }
    .estate-txns-meta {
      padding: 6px 10px 8px;
      color: #6b7280;
      font-size: 11px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }
    .estate-txns-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 8px 8px 10px;
    }
    .estate-txn-row {
      display: grid;
      grid-template-columns: 56px 56px 1fr;
      gap: 8px;
      padding: 8px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 8px;
      cursor: pointer;
    }
    .estate-txn-row:hover {
      background: rgba(255, 255, 255, 0.10);
    }
    .estate-txn-row .f {
      font-weight: 700;
      color: #374151;
      font-size: 12px;
    }
    .estate-txn-row .u {
      color: #6b7280;
      font-size: 12px;
    }
    .estate-txn-row .r {
      color: #111827;
      font-size: 12px;
      line-height: 1.2;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="overlay"></div>
  <div id="txnPopup" role="dialog" aria-live="polite">
    <button class="close" id="txnPopupClose" aria-label="Close">×</button>
    <div id="txnPopupBody"></div>
  </div>
  <div class="search-box">
    <input type="text" id="estateSearch" placeholder="Search estate..." list="estate-datalist" autocomplete="off" />
    <datalist id="estate-datalist"></datalist>
    <button type="button" id="estateSearchBtn">Go</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn" id="btn2d" title="Flat map (2D)">2D</button>
    <button class="mode-btn active" id="btn3d" title="Tilted view (3D)">3D</button>
  </div>
  <div class="txn-toggle">
    <button class="mode-btn active" id="btnTxn" title="Toggle transactions">Transactions</button>
  </div>
  <div class="legend" id="legend">
    <div class="legend-title">Price per sq ft (HK$)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#440154"></div><div>≤ 5,000</div></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#414487"></div><div>10,000</div></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#2a788e"></div><div>15,000</div></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#22a884"></div><div>20,000</div></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#7ad151"></div><div>25,000</div></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#fde725"></div><div>≥ 30,000</div></div>
    <div class="legend-note">Viridis · coloured by price_per_sqft</div>
  </div>

  <div class="estate-txns-widget" id="estateTxnsWidget">
    <div class="estate-txns-header">
      <div class="estate-txns-title" id="estateTxnsTitle">Estate transactions</div>
      <button class="estate-txns-close" id="estateTxnsClose" aria-label="Close">×</button>
    </div>
    <div class="estate-txns-meta" id="estateTxnsMeta"></div>
    <div class="estate-txns-list" id="estateTxnsList"></div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/positron',
      center: [114.1694, 22.3193],
      zoom: 14,
      pitch: 55,
      bearing: 0
    });

    // A transparent overlay map that renders transaction polygons on top of 3D buildings.
    const overlay = new maplibregl.Map({
      container: 'overlay',
      style: { version: 8, sources: {}, layers: [] },
      center: [114.1694, 22.3193],
      zoom: 14,
      pitch: 55,
      bearing: 0,
      interactive: false
    });

    // Keep overlay camera in sync with the main map.
    const syncOverlay = () => {
      const c = map.getCenter();
      overlay.jumpTo({
        center: [c.lng, c.lat],
        zoom: map.getZoom(),
        bearing: map.getBearing(),
        pitch: map.getPitch()
      });
    };
    map.on('move', syncOverlay);
    map.on('pitch', syncOverlay);
    map.on('rotate', syncOverlay);
    map.on('zoom', syncOverlay);
    map.on('resize', () => overlay.resize());

    map.on('load', () => {
      ['poi_transit', 'poi_r20', 'poi_r7', 'poi_r1'].forEach(id => {
        if (map.getLayer(id)) map.removeLayer(id);
      });

      const layers = map.getStyle().layers;
      let labelLayerId;
      for (let i = 0; i < layers.length; i++) {
        if (layers[i].type === 'symbol' && layers[i].layout['text-field']) {
          labelLayerId = layers[i].id;
          break;
        }
      }

      // 3D buildings (semi-transparent); transaction points render on top
      map.addSource('openfreemap-buildings', {
        type: 'vector',
        url: 'https://tiles.openfreemap.org/planet'
      });
      map.addLayer({
        id: '3d-buildings',
        source: 'openfreemap-buildings',
        'source-layer': 'building',
        type: 'fill-extrusion',
        minzoom: 14,
        filter: ['!=', ['get', 'hide_3d'], true],
        paint: {
          'fill-extrusion-color': '#e5e7eb',
          'fill-extrusion-opacity': 0.35,
          'fill-extrusion-height': [
            'interpolate', ['linear'], ['zoom'],
            14, 0,
            15, ['coalesce', ['get', 'render_height'], 8]
          ],
          'fill-extrusion-base': ['case',
            ['>=', ['get', 'zoom'], 15],
            ['coalesce', ['get', 'render_min_height'], 0],
            0
          ]
        }
      }, labelLayerId);

      // Transactions dataset: one point per transaction at its location
      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      const parseCsvText = (text) => {
        const rows = [];
        let row = [];
        let cell = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i += 1) {
          const ch = text[i];
          if (inQuotes) {
            if (ch === '"') {
              if (text[i + 1] === '"') {
                cell += '"';
                i += 1;
              } else {
                inQuotes = false;
              }
            } else {
              cell += ch;
            }
            continue;
          }
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            row.push(cell);
            cell = '';
          } else if (ch === '\n') {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
          } else if (ch !== '\r') {
            cell += ch;
          }
        }
        row.push(cell);
        // Avoid adding an extra empty row for trailing newlines.
        if (row.length > 1 || row[0] !== '') rows.push(row);
        return rows;
      };

      const csvRowsToPointFeatures = (rows) => {
        if (!rows || rows.length < 2) return [];
        const headers = rows[0].map(h => String(h || '').trim());
        const idx = new Map(headers.map((h, i) => [h, i]));
        const gi = (name) => idx.has(name) ? idx.get(name) : -1;
        const iLat = gi('latitude');
        const iLng = gi('longitude');
        if (iLat < 0 || iLng < 0) return [];

        const asNum = (v) => {
          const n = Number(String(v == null ? '' : v).trim());
          return Number.isFinite(n) ? n : null;
        };
        const asText = (v) => String(v == null ? '' : v).trim();
        const safe = (arr, i) => (i >= 0 && i < arr.length ? arr[i] : '');

        const features = [];
        const seenTxnKeys = new Set();
        for (let r = 1; r < rows.length; r += 1) {
          const row = rows[r];
          const lat = asNum(safe(row, iLat));
          const lng = asNum(safe(row, iLng));
          if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;

          const address = asText(safe(row, gi('address')));
          const estate = address ? address.split(',')[0].trim() : '';
          const unitRateRaw = asNum(safe(row, gi('unit_rate')));
          const pricePerSqft = unitRateRaw == null
            ? null
            : (unitRateRaw <= 500 ? unitRateRaw * 1000 : unitRateRaw);

          const tower = asText(safe(row, gi('Tower')));
          const block = asText(safe(row, gi('Block')));
          const phase = asText(safe(row, gi('Phase')));
          const floorVal = asNum(safe(row, gi('floor'))) ?? 0;
          const unit = asText(safe(row, gi('Flat')));
          const area = asNum(safe(row, gi('saleable_area(ft^2)')));
          const price = asNum(safe(row, gi('price')));
          const dateVal = asText(safe(row, gi('date'))) || null;

          // Drop exact duplicate transaction rows from source CSV.
          const dedupeKey = [
            estate,
            address,
            dateVal || '',
            String(floorVal),
            unit,
            String(area == null ? '' : area),
            String(price == null ? '' : price),
            String(pricePerSqft == null ? '' : pricePerSqft),
            tower,
            block,
            phase,
            lng.toFixed(8),
            lat.toFixed(8)
          ].join('\t');
          if (seenTxnKeys.has(dedupeKey)) continue;
          seenTxnKeys.add(dedupeKey);

          const building = [estate, phase && `Phase ${phase}`, tower && `Tower ${tower}`, block && `Block ${block}`]
            .filter(Boolean)
            .join(', ');

          features.push({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [lng, lat] },
            properties: {
              estate,
              building: building || estate || address,
              address,
              unit,
              floor: floorVal,
              area,
              price,
              price_per_sqft: pricePerSqft,
              date: dateVal,
              district: asText(safe(row, gi('district'))),
              changes: asText(safe(row, gi('changes')))
            }
          });
        }
        return features;
      };

      const popupEl = document.getElementById('txnPopup');
      const popupBodyEl = document.getElementById('txnPopupBody');
      const popupCloseEl = document.getElementById('txnPopupClose');
      let popupLngLat = null;

      const hidePopup = () => {
        popupEl.style.display = 'none';
        popupLngLat = null;
      };
      const positionPopup = () => {
        if (!popupLngLat) return;
        const p = map.project(popupLngLat);
        const pad = 12;
        const w = popupEl.offsetWidth || 240;
        const h = popupEl.offsetHeight || 140;
        let left = p.x - w / 2;
        let top = p.y - h - 14;
        left = Math.max(pad, Math.min(window.innerWidth - w - pad, left));
        top = Math.max(pad, Math.min(window.innerHeight - h - pad, top));
        popupEl.style.left = `${left}px`;
        popupEl.style.top = `${top}px`;
      };
      const showPopup = (lngLat, props) => {
        const dateStr = props.date ? new Date(props.date).toLocaleDateString('en-GB') : '';
        popupBodyEl.innerHTML =
          `<div style="padding-right:22px;">
            <strong>${escapeHtml(props.building || '')}</strong><br>
            ${props.estate ? escapeHtml(String(props.estate)) + '<br>' : ''}
            ${props.floor != null ? 'Floor ' + escapeHtml(String(props.floor)) + (props.unit ? ' · Unit ' + escapeHtml(String(props.unit)) : '') + '<br>' : ''}
            ${props.area != null ? 'Area: ' + escapeHtml(String(props.area)) + ' sq ft<br>' : ''}
            ${props.price != null ? 'Price: HK$ ' + escapeHtml(String(props.price)) + ' (×10k)<br>' : ''}
            ${props.price_per_sqft != null ? 'Price/sq ft: HK$ ' + Math.round(Number(props.price_per_sqft)).toLocaleString('en-HK') + '<br>' : ''}
            ${dateStr ? 'Date: ' + dateStr : ''}
          </div>`;
        popupLngLat = lngLat;
        popupEl.style.display = 'block';
        positionPopup();
      };

      popupCloseEl.addEventListener('click', hidePopup);
      window.addEventListener('resize', positionPopup);
      map.on('move', positionPopup);

      fetch('data/midland_2018_cleaned.geojson')
        .then(res => res.json())
        .then(geojson => {
          // Render points as small ground polygons so they truly lie on the map plane in 3D.
          const M_TO_DEG_LAT = 1 / 111320;
          const COS_LAT = Math.cos(22.3 * Math.PI / 180);
          const M_TO_DEG_LNG = 1 / (111320 * COS_LAT);
          const FLOOR_M = 3; // 1 floor = 3 meters
          const ELEVATION_OFFSET_M = 4; // lift all slabs by +4m
          const SLAB_THICKNESS_M = 1; // polygon height 1 m

          const rawPoints = (geojson.features || []).filter(f => f && f.geometry && f.geometry.type === 'Point');

          // Estate -> transactions for the widget
          const estateTxns = new Map(); // estate -> array of { lng, lat, props }
          rawPoints.forEach(f => {
            const estate = (f.properties && f.properties.estate) ? String(f.properties.estate).trim() : '';
            if (!estate) return;
            const [lng, lat] = f.geometry.coordinates;
            if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;
            if (!estateTxns.has(estate)) estateTxns.set(estate, []);
            estateTxns.get(estate).push({ lng, lat, props: f.properties || {} });
          });

          const estateTxnsWidget = document.getElementById('estateTxnsWidget');
          const estateTxnsTitle = document.getElementById('estateTxnsTitle');
          const estateTxnsMeta = document.getElementById('estateTxnsMeta');
          const estateTxnsList = document.getElementById('estateTxnsList');
          const estateTxnsClose = document.getElementById('estateTxnsClose');

          const openEstateTxns = (estateName) => {
            const items = estateTxns.get(estateName) || [];
            if (!items.length) return;

            estateTxnsTitle.textContent = estateName;

            const maxShow = 120;
            const sorted = items
              .slice()
              .sort((a, b) => {
                const fa = Number(a.props.floor);
                const fb = Number(b.props.floor);
                if (Number.isFinite(fa) && Number.isFinite(fb)) return fb - fa;
                const da = a.props.date ? new Date(a.props.date).getTime() : 0;
                const db = b.props.date ? new Date(b.props.date).getTime() : 0;
                return db - da;
              });

            estateTxnsMeta.textContent = `Transactions: ${items.length} (showing top ${Math.min(maxShow, items.length)})`;
            estateTxnsList.innerHTML = sorted.slice(0, maxShow).map(t => {
              const floor = t.props.floor != null ? String(t.props.floor) : '';
              const unit = t.props.unit != null ? String(t.props.unit) : '';
              const ppsf = t.props.price_per_sqft != null
                ? `HK$ ${Math.round(Number(t.props.price_per_sqft)).toLocaleString('en-HK')}/sq ft`
                : '';
              const dateStr = t.props.date ? new Date(t.props.date).toLocaleDateString('en-GB') : '';
              const building = t.props.building ? String(t.props.building) : '';
              return `
                <div class="estate-txn-row" data-lng="${t.lng}" data-lat="${t.lat}">
                  <div class="f">${escapeHtml(floor)}</div>
                  <div class="u">${escapeHtml(unit)}</div>
                  <div class="r">
                    ${escapeHtml(ppsf)}<br>
                    ${escapeHtml(building)}${dateStr ? `<br>${escapeHtml(dateStr)}` : ''}
                  </div>
                </div>
              `;
            }).join('');

            estateTxnsWidget.style.display = 'flex';
          };

          estateTxnsClose.addEventListener('click', () => {
            estateTxnsWidget.style.display = 'none';
          });

          // Click a row: fly to it and show the transaction popup.
          estateTxnsList.addEventListener('click', (e) => {
            const row = e.target && e.target.closest ? e.target.closest('.estate-txn-row') : null;
            if (!row) return;
            const lng = Number(row.getAttribute('data-lng'));
            const lat = Number(row.getAttribute('data-lat'));
            if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;

            // Find the first matching transaction at the same coordinates within this estate.
            // (Coordinates were rounded only for cluster center; for listing we keep original points.)
            const currentEstate = estateTxnsTitle.textContent;
            const items = estateTxns.get(currentEstate) || [];
            const hit = items.find(t => Math.abs(t.lng - lng) < 1e-6 && Math.abs(t.lat - lat) < 1e-6);
            if (!hit) return;
            map.flyTo({ center: [lng, lat], zoom: 16, pitch: 55, duration: 800 });
            showPopup([lng, lat], hit.props || {});
          });

          // Estate → flyTo center. Use largest cluster (by building) so we don't land in empty space
          // when an estate has towers in different locations (e.g. The Avenue).
          const estateClusters = new Map(); // estate -> Map(clusterKey -> { sumLng, sumLat, n })
          rawPoints.forEach(f => {
            const estate = (f.properties && f.properties.estate) ? String(f.properties.estate).trim() : '';
            if (!estate) return;
            const [lng, lat] = f.geometry.coordinates;
            const clusterKey = `${lng.toFixed(5)}\t${lat.toFixed(5)}`;
            if (!estateClusters.has(estate)) estateClusters.set(estate, new Map());
            const clusters = estateClusters.get(estate);
            if (!clusters.has(clusterKey)) clusters.set(clusterKey, { sumLng: 0, sumLat: 0, n: 0 });
            const c = clusters.get(clusterKey);
            c.sumLng += lng;
            c.sumLat += lat;
            c.n += 1;
          });
          const estateCenters = new Map();
          estateClusters.forEach((clusters, estate) => {
            let best = null;
            let bestN = 0;
            clusters.forEach((v, key) => {
              if (v.n > bestN) { bestN = v.n; best = v; }
            });
            if (best) estateCenters.set(estate, [best.sumLng / best.n, best.sumLat / best.n]);
          });

          const estateNames = [...estateCenters.keys()].sort((a, b) => a.localeCompare(b));
          const datalist = document.getElementById('estate-datalist');
          datalist.innerHTML = estateNames.map(name => `<option value="${name.replace(/"/g, '&quot;')}">`).join('');

          const doSearch = () => {
            const query = (document.getElementById('estateSearch').value || '').trim();
            if (!query) return;
            const q = query.toLowerCase();
            const match = estateNames.find(n => n.toLowerCase() === q) ||
              estateNames.find(n => n.toLowerCase().startsWith(q)) ||
              estateNames.find(n => n.toLowerCase().includes(q));
            if (!match) return;
            const center = estateCenters.get(match);
            if (!center) return;
            map.flyTo({ center, zoom: 16, pitch: 55, duration: 1500 });

            // Open the transactions widget for this estate
            openEstateTxns(match);
          };
          document.getElementById('estateSearchBtn').addEventListener('click', doSearch);
          document.getElementById('estateSearch').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
          document.getElementById('estateSearch').addEventListener('change', doSearch);

          // Precompute slots for transactions sharing the same location and floor.
          // This prevents full overlap and makes each transaction visible.
          const floorGroupSlotByIndex = new Array(rawPoints.length);
          const floorGroups = new Map(); // key -> point indices
          rawPoints.forEach((f, idx) => {
            const [lng, lat] = f.geometry.coordinates;
            const floorRaw = f.properties && f.properties.floor != null ? Number(f.properties.floor) : 0;
            const floor = Number.isFinite(floorRaw) ? floorRaw : 0;
            const key = `${lng.toFixed(8)}\t${lat.toFixed(8)}\t${floor}`;
            if (!floorGroups.has(key)) floorGroups.set(key, []);
            floorGroups.get(key).push(idx);
          });
          floorGroups.forEach((indices) => {
            if (!indices.length) return;
            const sorted = indices.slice().sort((ia, ib) => {
              const a = rawPoints[ia].properties || {};
              const b = rawPoints[ib].properties || {};
              const ua = String(a.unit || '');
              const ub = String(b.unit || '');
              if (ua !== ub) return ua.localeCompare(ub);
              const da = a.date ? new Date(a.date).getTime() : 0;
              const db = b.date ? new Date(b.date).getTime() : 0;
              return da - db;
            });
            const n = sorted.length;
            const cols = Math.ceil(Math.sqrt(n));
            const rows = Math.ceil(n / cols);
            sorted.forEach((pointIdx, k) => {
              const col = k % cols;
              const row = Math.floor(k / cols);
              floorGroupSlotByIndex[pointIdx] = { col, row, cols, rows };
            });
          });

          const markerSizeForZoomM = (z) => {
            // Adaptive size: zoom out -> bigger polygons (meters on the ground).
            let m;
            if (z <= 11) m = 120;
            else if (z <= 12) m = 95;
            else if (z <= 13) m = 70;
            else if (z <= 14) m = 52;
            else if (z <= 15) m = 22;
            else m = 10;

            // In 2D mode (pitch=0), make polygons much larger on zoom-out (3×).
            if (!is3d && z <= 14) m *= 3;
            return m;
          };

          const buildMarkers = (markerM) => {
            const footprintM = markerM * 1.7; // total area reserved per location+floor group
            const minCellM = 3; // keep tiny groups still visible/clickable
            return {
              type: 'FeatureCollection',
              features: rawPoints.map((f, idx) => {
                const [lng, lat] = f.geometry.coordinates;
                const floor = f.properties && f.properties.floor != null ? Number(f.properties.floor) : 0;
                const baseElevation = floor * FLOOR_M + ELEVATION_OFFSET_M;
                const slot = floorGroupSlotByIndex[idx] || { col: 0, row: 0, cols: 1, rows: 1 };

                // Divide the footprint into exactly N non-overlapping grid cells.
                const cellWm = Math.max(minCellM, footprintM / slot.cols);
                const cellHm = Math.max(minCellM, footprintM / slot.rows);
                const centerXm = -footprintM / 2 + (slot.col + 0.5) * (footprintM / slot.cols);
                const centerYm = -footprintM / 2 + (slot.row + 0.5) * (footprintM / slot.rows);
                const halfLng = (cellWm / 2) * M_TO_DEG_LNG * 0.9;
                const halfLat = (cellHm / 2) * M_TO_DEG_LAT * 0.9;
                const dx = centerXm * M_TO_DEG_LNG;
                const dy = centerYm * M_TO_DEG_LAT;
                const clng = lng + dx;
                const clat = lat + dy;
                return {
                  type: 'Feature',
                  properties: {
                    ...(f.properties || {}),
                    baseElevation,
                    topElevation: baseElevation + SLAB_THICKNESS_M
                  },
                  geometry: {
                    type: 'Polygon',
                    coordinates: [[
                      [clng - halfLng, clat - halfLat],
                      [clng + halfLng, clat - halfLat],
                      [clng + halfLng, clat + halfLat],
                      [clng - halfLng, clat + halfLat],
                      [clng - halfLng, clat - halfLat]
                    ]]
                  }
                };
              })
            };
          };

          let groundMarkers = buildMarkers(markerSizeForZoomM(map.getZoom()));

          // Overlay polygons are rendered in a separate transparent map so they can’t be occluded.
          const addOverlayLayer = () => {
            if (overlay.getSource('midland-2018')) return;
            overlay.addSource('midland-2018', {
              type: 'geojson',
              data: groundMarkers
            });
            // Elevated flat slabs (floor-based) in the overlay map: always visible above 3D buildings.
            overlay.addLayer({
              id: 'midland-slabs',
              type: 'fill-extrusion',
              source: 'midland-2018',
              paint: {
                'fill-extrusion-base': ['get', 'baseElevation'],
                'fill-extrusion-height': ['get', 'topElevation'],
                'fill-extrusion-color': [
                  'interpolate',
                  ['linear'],
                  ['coalesce', ['get', 'price_per_sqft'], 0],
                  5000, '#440154',
                  10000, '#414487',
                  15000, '#2a788e',
                  20000, '#22a884',
                  25000, '#7ad151',
                  30000, '#fde725'
                ],
                'fill-extrusion-opacity': 0.9
              }
            });
            syncOverlay();
            const vis = transactionsVisible ? 'visible' : 'none';
            overlay.setLayoutProperty('midland-slabs', 'visibility', vis);
            window.__setTransactionsVisible = (v) => {
              transactionsVisible = v;
              if (overlay.getLayer('midland-slabs')) {
                overlay.setLayoutProperty('midland-slabs', 'visibility', v ? 'visible' : 'none');
              }
            };
          };
          if (overlay.isStyleLoaded()) addOverlayLayer();
          else overlay.once('load', addOverlayLayer);

          // Update polygon footprint when zooming (zoom out => bigger polygons).
          const updateMarkerFootprint = () => {
            const z = map.getZoom();
            groundMarkers = buildMarkers(markerSizeForZoomM(z));
            const src = overlay.getSource('midland-2018');
            if (src && src.setData) src.setData(groundMarkers);
          };
          map.on('zoomend', updateMarkerFootprint);
          // Expose for 2D/3D toggle to refresh sizes immediately.
          window.__updateMarkerFootprint = updateMarkerFootprint;

          // Click anywhere: if the overlay polygon is under the cursor, show the same popup.
          map.on('click', (e) => {
            if (!overlay.isStyleLoaded()) return;
            const feats = overlay.queryRenderedFeatures(e.point, { layers: ['midland-slabs'] });
            if (!feats || feats.length === 0) {
              hidePopup();
              return;
            }
            showPopup(e.lngLat, feats[0].properties || {});
          });
          map.getCanvas().style.cursor = '';
          map.on('mousemove', (e) => {
            if (!overlay.isStyleLoaded()) return;
            const feats = overlay.queryRenderedFeatures(e.point, { layers: ['midland-slabs'] });
            map.getCanvas().style.cursor = feats && feats.length ? 'pointer' : '';
          });
        })
        .catch(err => console.warn('Could not load Midland GeoJSON:', err));
    });

    map.addControl(new maplibregl.NavigationControl());

    const PITCH_3D = 55;
    let is3d = true;
    let transactionsVisible = true;

    document.getElementById('btn2d').onclick = () => {
      if (is3d) {
        is3d = false;
        document.getElementById('btn2d').classList.add('active');
        document.getElementById('btn3d').classList.remove('active');
        map.easeTo({ pitch: 0, duration: 400 });
        if (window.__updateMarkerFootprint) window.__updateMarkerFootprint();
      }
    };
    document.getElementById('btn3d').onclick = () => {
      if (!is3d) {
        is3d = true;
        document.getElementById('btn3d').classList.add('active');
        document.getElementById('btn2d').classList.remove('active');
        map.easeTo({ pitch: PITCH_3D, duration: 400 });
        if (window.__updateMarkerFootprint) window.__updateMarkerFootprint();
      }
    };

    document.getElementById('btnTxn').onclick = () => {
      transactionsVisible = !transactionsVisible;
      if (window.__setTransactionsVisible) window.__setTransactionsVisible(transactionsVisible);
      document.getElementById('btnTxn').classList.toggle('active', transactionsVisible);
    };

    // Rotate map with Command + drag
    const container = map.getContainer();
    let rotating = false;
    let startBearing = 0;
    let startX = 0;

    container.addEventListener('mousedown', (e) => {
      if (e.metaKey) {
        e.preventDefault();
        rotating = true;
        startBearing = map.getBearing();
        startX = e.clientX;
        container.style.cursor = 'grabbing';
      }
    });

    container.addEventListener('mousemove', (e) => {
      if (rotating) {
        const delta = e.clientX - startX;
        map.setBearing(startBearing + delta);
      } else if (e.metaKey) {
        container.style.cursor = 'grab';
      }
    });

    const stopRotating = () => {
      rotating = false;
      container.style.cursor = '';
    };
    container.addEventListener('mouseup', stopRotating);
    container.addEventListener('mouseleave', stopRotating);
  </script>
</body>
</html>
